<h1>Counter App</h1>
<div >
  <h2 class="app-counter">Count: {{ count }}</h2>
  <div class="buttons">

    <button (click)="increment()" class="btn">Increment</button>
    <button (click)="decrement()" class="btn">Decrement</button>
    <button (click)="reset()" class="btn">Reset</button>
  </div>
</div>
