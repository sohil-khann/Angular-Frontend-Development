<header class="keep-header">
  <div class="keep-brand">
    <button
      type="button"
      class="icon-button"
      aria-label="Toggle sidebar"
      (click)="menuToggleRequested.emit()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 7h16M4 12h16M4 17h16" />
      </svg>
    </button>
    <div class="keep-brand__logo">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M7 3h7l4 4v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Zm7 1.5V8h3.5"
          fill="currentColor"
        />
      </svg>
    </div>
    <div class="keep-brand__text">
      <p>Fundoo</p>
      <span>Keep notes</span>
    </div>
  </div>

  <label class="keep-search">
    <span class="keep-search__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="6"></circle>
        <path d="M16 16l4 4"></path>
      </svg>
    </span>
    <input
      [ngModel]="searchText"
      (ngModelChange)="onSearchChange($event)"
      type="text"
      placeholder="Search"
    />
  </label>

  <div class="keep-header__actions">
    <a routerLink="/home/invitations" class="icon-button" aria-label="View invitations" title="Invitations">
      <!-- <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 6h16v12H4z"></path>
        <path d="m4 7 8 6 8-6"></path>
      </svg> -->
      <img class="icon" src="invitation.png" alt="invitation">
    </a>

    <a routerLink="/home/sessions" class="icon-button" aria-label="View sessions">
      <!-- <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="4" y="5" width="16" height="12"></rect>
        <path d="M9 19h6"></path>
      </svg> -->
      <img class="icon" src="session.png" alt="Session" title="session">
    </a>

    <button
      type="button"
      class="keep-profile"
      aria-label="Open account menu"
      (click)="toggleProfileMenu()"
    >
      <span class="keep-profile__circle">{{ currentUserName.charAt(0).toUpperCase() }}</span>
    </button>

    @if (isProfileMenuOpen) {
      <div class="keep-profile-menu">
        <div class="keep-profile-menu__summary">
          <strong>{{ currentUserName }}</strong>
          <span>{{ currentUserEmail }}</span>
          <small>{{ isEmailVerified ? 'Email verified' : 'Email not verified yet' }}</small>
        </div>

        <div class="keep-profile-menu__actions">
          <button
            type="button"
            class="secondary-button"
            [disabled]="isWorking"
            (click)="refreshSessionRequested.emit(); closeProfileMenu()"
          >
            Refresh session
          </button>
          <a routerLink="/change-password" class="secondary-link" (click)="closeProfileMenu()">
            Change password
          </a>
          @if (!isEmailVerified) {
            <button
              type="button"
              class="secondary-button"
              [disabled]="isWorking"
              (click)="resendVerificationRequested.emit(); closeProfileMenu()"
            >
              Resend verification
            </button>
          }
          <button
            type="button"
            class="secondary-button"
            [disabled]="isWorking"
            (click)="logoutRequested.emit(); closeProfileMenu()"
          >
            Logout
          </button>
          <button
            type="button"
            class="danger-button"
            [disabled]="isWorking"
            (click)="logoutAllRequested.emit(); closeProfileMenu()"
          >
            Logout all devices
          </button>
        </div>
      </div>
    }
  </div>
</header>
