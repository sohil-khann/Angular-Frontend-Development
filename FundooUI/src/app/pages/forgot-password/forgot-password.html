<section class="login-page">
  <div class="login-card">
    <div class="brand">
      <span class="brand__letter brand__letter--blue">F</span>
      <span class="brand__letter brand__letter--red">u</span>
      <span class="brand__letter brand__letter--yellow">n</span>
      <span class="brand__letter brand__letter--blue">d</span>
      <span class="brand__letter brand__letter--green">o</span>
      <span class="brand__letter brand__letter--red">o</span>
    </div>

    <h1>Forgot password?</h1>
    <p class="subtitle">Enter your account email and we will send a reset link.</p>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="field-group">
        <input type="email" formControlName="email" placeholder="Email address" />
        @if (hasControlError()) {
          <p class="field-error">Enter a valid email address.</p>
        }
      </div>

      @if (successMessage) {
        <p class="form-message form-message--success">{{ successMessage }}</p>
      }

      @if (errorMessage) {
        <p class="form-message form-message--error">{{ errorMessage }}</p>
      }

      <div class="form-actions">
        <a routerLink="/login" class="text-link">Back to sign in</a>
        <button type="submit">{{ isSubmitting ? 'Sending...' : 'Send Reset Email' }}</button>
      </div>
    </form>
  </div>
</section>
